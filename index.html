<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenGarden Self-Care</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="light-mode">
    <div id="login-screen" class="container">
        <h1>🌱 ZenGarden</h1>
        
        <div id="login-form">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()">Enter Garden</button>
            <p>New here? <a href="#" onclick="toggleAuth(true)">Register</a></p>
        </div>
        
        <div id="register-form" style="display: none;">
            <h3>Create Account</h3>
            <input type="text" id="reg-username" placeholder="Choose Username">
            <input type="password" id="reg-password" placeholder="Choose Password">
            <button onclick="handleRegister()" style="background-color: var(--accent-pink);">Sign Up</button>
            <p>Already a gardener? <a href="#" onclick="toggleAuth(false)">Login</a></p>
        </div>
        
        <p id="auth-error"></p>
    </div>

    <div id="app-screen" class="container" style="display: none;">
        <div class="header-actions">
            <button id="theme-toggle" onclick="toggleTheme()">🌙 Sunset Mode</button>
            <h2 id="welcome-msg">Hi, Gardener! 🌿</h2>
        </div>

        <div id="garden-display">
            <p>Your Garden Growth:</p>
            <div id="plant-box"></div>
        </div>
        
        <nav>
            <button onclick="showSection('mood')">🌸 Mood</button>
            <button onclick="showSection('journal')">📖 Journal</button>
            <button onclick="showSection('balance')">⚖️ Balance</button>
        </nav>

        <section id="mood-section">
            <h2>How are you feeling?</h2>
            <div class="mood-options">
                <button onclick="setMood('happy')">happy<br>😊</button>
                <button onclick="setMood('calm')">calm<br>😌</button>
                <button onclick="setMood('energized')">energised<br>⚡</button>
                <button onclick="setMood('stressed')">😟stressed<br></button>
                <button onclick="setMood('anxious')">anxious<br>😰</button>
                <button onclick="setMood('sad')">sad<br>😢</button>
                <button onclick="setMood('tired')">tired<br>🥱</button>
                <button onclick="setMood('overwhelmed')">overwhelemed😣</button>
            </div>

            <div id="todo-area" style="display:none;">
                <h3 id="mood-title">Suggestions:</h3>
                <ul id="todo-list"></ul>
            </div>

            <div id="streak-counter" style="display: none;">
                🔥 <strong id="streak-days">0</strong> day streak!
            </div>
            
            <div id="mood-history"></div>
        </section>

        <section id="journal-section" style="display:none;">
            <h2>Reflections</h2>
            <textarea id="journal-input" placeholder="What’s on your mind..."></textarea>
            <button onclick="saveJournal()" class="full-width">Save & Grow 🌱</button>
            <button onclick="exportJournal()" class="secondary-btn">Export (TXT)</button>
            <div id="past-entries"></div>
        </section>

        <section id="balance-section" style="display:none;">
            <h2>Work-Life Balance</h2>
            <div class="input-group">
                <input type="number" id="work-hrs" placeholder="Work Hours">
                <input type="number" id="social-hrs" placeholder="Rest Hours">
                <button onclick="updateChart()" class="full-width">Update Chart</button>
            </div>
            <div class="chart-container">
                <canvas id="balanceChart"></canvas>
            </div>
            <button id="focus-btn" onclick="toggleFocusMode()" class="full-width">Deep Focus Mode</button>
        </section>

        <button onclick="location.reload()" class="logout-btn">Logout</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
