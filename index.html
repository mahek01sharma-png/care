<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenGarden Self-Care</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="login-screen" class="container">
        <h1>Welcome to ZenGarden</h1>
        <p>Please log in to continue</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Enter Garden</button>
        <p id="login-error" style="color: red;"></p>
    </div>

    <div id="app-screen" class="container" style="display: none;">
        <nav>
            <button onclick="showSection('mood')">Mood</button>
            <button onclick="showSection('journal')">Journal</button>
            <button onclick="showSection('balance')">Balance</button>
        </nav>

        <section id="mood-section">
            <h2>How are you feeling?</h2>
            <div class="mood-options">
                <button onclick="setMood('Happy')">😊 Happy</button>
                <button onclick="setMood('Stressed')">😫 Stressed</button>
                <button onclick="setMood('Calm')">🌿 Calm</button>
            </div>
            <div id="todo-area" style="display:none;">
                <h3>Action Items for Stress:</h3>
                <ul id="todo-list"></ul>
            </div>
        </section>

        <section id="journal-section" style="display:none;">
            <h2>Daily Reflections</h2>
            <textarea id="journal-input" placeholder="Write your thoughts here..."></textarea>
            <button onclick="saveJournal()">Save Entry</button>
            <div id="past-entries"></div>
        </section>

        <section id="balance-section" style="display:none;">
            <h2>Work-Life Balance</h2>
            <div class="input-group">
                <label>Work Hours:</label> <input type="number" id="work-hrs">
                <label>Social Hours:</label> <input type="number" id="social-hrs">
                <button onclick="updateChart()">Update</button>
            </div>
            <div id="chart-display"></div>
            <hr>
            <button id="focus-btn" onclick="toggleFocusMode()">Enable Deep Focus Mode</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
