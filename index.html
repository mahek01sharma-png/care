<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenGarden Self-Care</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="light-mode">
    <!-- Login Screen -->
    <div id="login-screen" class="container">
        <h1>🌱 ZenGarden</h1>
        
        <div id="login-form">
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleLogin()">Enter Garden</button>
            <p>New here? <a href="#" onclick="toggleAuth(true)">Register</a></p>
        </div>
        
        <div id="register-form" style="display: none;">
            <h3>Create Account</h3>
            <input type="text" id="reg-username" placeholder="Choose Username">
            <input type="password" id="reg-password" placeholder="Choose Password">
            <button onclick="handleRegister()">Sign Up</button>
            <p>Already a gardener? <a href="#" onclick="toggleAuth(false)">Login</a></p>
        </div>
        
        <p id="auth-error"></p>
    </div>

    <!-- Main App Screen -->
    <div id="app-screen" class="container" style="display: none;">
        <div class="header-actions">
            <button id="theme-toggle" onclick="toggleTheme()">🌙 Sunset Mode</button>
            <h2 id="welcome-msg">Hi, Gardener! 🌿</h2>
        </div>

        <div id="garden-display">
            <p>Your Garden Growth:</p>
            <div id="plant-box"></div>
        </div>

        <nav>
            <button onclick="showSection('mood')">🌸 Mood</button>
            <button onclick="showSection('journal')">📖 Journal</button>
            <button onclick="showSection('balance')">⚖️ Balance</button>
        </nav>

        <!-- MOOD SECTION -->
        <section id="mood-section">
            <h2>How are you feeling right now?</h2>
            
            <div class="mood-options">
                <button onclick="setMood('happy')">😊 Happy</button>
                <button onclick="setMood('calm')">😌 Calm</button>
                <button onclick="setMood('energized')">⚡ Energized</button>
                <button onclick="setMood('stressed')">😟 Stressed</button>
                <button onclick="setMood('anxious')">😰 Anxious</button>
                <button onclick="setMood('sad')">😢 Sad</button>
                <button onclick="setMood('tired')">🥱 Tired</button>
                <button onclick="setMood('overwhelmed')">😣 Overwhelmed</button>
            </div>

            <div id="todo-area" style="display:none;">
                <h3 id="mood-title">Suggestions:</h3>
                <ul id="todo-list"></ul>
            </div>

            <div id="streak-counter" style="display: none;">
                🔥 <strong id="streak-days">0</strong> day streak! Keep growing!
            </div>
            
            <div id="mood-history"></div>
        </section>

        <!-- JOURNAL SECTION -->
        <section id="journal-section" style="display:none;">
            <h2>Reflections</h2>
            <textarea id="journal-input" placeholder="What’s on your mind today..."></textarea>
            <button onclick="saveJournal()" style="width: 100%; margin: 10px 0;">Save & Grow Plant 🌱</button>
            <button onclick="exportJournal()" class="secondary-btn">Export Journal (TXT)</button>
            <div id="past-entries"></div>
        </section>

        <!-- BALANCE SECTION -->
        <section id="balance-section" style="display:none;">
            <h2>Work-Life Balance</h2>
            <div class="input-group">
                <input type="number" id="work-hrs" placeholder="Work Hours Today">
                <input type="number" id="social-hrs" placeholder="Social / Rest Hours">
                <button onclick="updateChart()" style="width: 100%;">Update Chart</button>
            </div>
            <canvas id="balanceChart"></canvas>
            
            <hr>
            <button id="focus-btn" onclick="toggleFocusMode()" style="width: 100%;">Deep Focus Mode</button>
        </section>

        <button onclick="location.reload()" class="logout-btn">Logout</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
